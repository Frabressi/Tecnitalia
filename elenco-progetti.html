<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Progetti | Tecnitalia Group</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div id="nav-placeholder"></div>

    <header class="page-header">
        <h1>Archivio Progetti</h1>
        <p style="font-size: 1.2rem;">Dal 1986, i nostri principali interventi sul territorio nazionale.</p>
    </header>

    <main class="page-content" style="max-width: 1200px;">
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterProjects('tutti', this)">Tutti i Progetti</button>
            <button class="filter-btn" onclick="filterProjects('bonifica', this)">Bonifiche</button>
            <button class="filter-btn" onclick="filterProjects('amianto', this)">Amianto / FAV</button>
            <button class="filter-btn" onclick="filterProjects('acque', this)">Acque / Falde</button>
            <button class="filter-btn" onclick="filterProjects('rifiuti', this)">Rifiuti / Discariche</button>
            <button class="filter-btn" onclick="filterProjects('demolizione', this)">Demolizioni / Decommissioning</button>
        </div>

        <div id="projects-grid-full" class="projects-full-grid"></div>

    </main>

    <div id="footer-placeholder"></div>

    <div class="modal" id="projectModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeProject()">×</button>
            <div class="m-header">
                <div class="m-slides-wrapper" id="m-slides-wrapper"></div>
                <button class="m-img-btn prev" onclick="changeModalImg(-1)" id="m-btn-prev">&#10094;</button>
                <button class="m-img-btn next" onclick="changeModalImg(1)" id="m-btn-next">&#10095;</button>
            </div>
            <div class="m-scroll-content" data-lenis-prevent>
                <h2 id="m-title" style="color:var(--blue); margin-bottom:20px; font-size:2rem; line-height:1.2;"></h2>
                <div class="m-specs">
                    <div><strong>Committente</strong> <span id="m-client"></span></div>
                    <div><strong>Periodo</strong> <span id="m-period"></span></div>
                    <div><strong>Importo</strong> <span id="m-val"></span></div>
                    <div><strong>Attività</strong> <span id="m-type"></span></div>
                </div>
                <div id="m-desc" style="color:#333;"></div>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
