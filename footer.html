<footer id="contatti" class="footer-sec">
    <div class="footer-grid">
        <div>
            <h3 style="color:white; margin-bottom:20px;">Contattaci</h3>
            <p><strong>Tecnitalia Group</strong><br>Via Pastorelli 4E, 20143 Milano</p>
            <p>Tel: 02 76000206<br>Email: info@tecnitaliagroup.it</p>
        </div>
        <div class="form-box">
            <form id="contact-form">
                <input type="text" name="name" placeholder="Nome" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" rows="3" placeholder="Messaggio" required></textarea>
                <button type="submit" class="submit-btn" id="submit-btn">Invia Messaggio</button>
            </form>
            <div id="form-status" style="display:none; color:white; margin-top:15px; text-align:center; font-weight:bold; font-size:0.9rem;"></div>
        </div>
    </div>
    <div style="text-align:center; margin-top:50px; border-top:1px solid #333; padding-top:20px;">

    </div>
</footer>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="text/javascript">
    (function() {
        // Inizializzazione con la tua chiave pubblica recuperata dalla sezione Account
        emailjs.init({
          publicKey: "IxQp4s1e-bTQOqX3J", // <-- SOSTITUISCI CON LA TUA PUBLIC KEY (sezione Account su EmailJS)
        });
    })();

    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault(); 

        const form = this;
        const btn = document.getElementById('submit-btn');
        const statusDiv = document.getElementById('form-status');

        btn.textContent = 'Invio in corso...';
        btn.disabled = true;

        // Esecuzione dell'invio con il Service ID e il Template ID corretti
        emailjs.sendForm('service_x33x9c9', 'template_6u6e1jo', form)
            .then(() => {
                btn.textContent = 'Invia Messaggio';
                btn.disabled = false;
                statusDiv.style.color = '#4CAF50'; // Verde successo
                statusDiv.textContent = 'Messaggio inviato con successo!';
                statusDiv.style.display = 'block';
                form.reset(); // Svuota i campi del form dopo l'invio
                
                setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
            }, (error) => {
                btn.textContent = 'Invia Messaggio';
                btn.disabled = false;
                statusDiv.style.color = '#F44336'; // Rosso errore
                statusDiv.textContent = "Errore durante l'invio. Riprova più tardi.";
                statusDiv.style.display = 'block';
                console.error('EmailJS Error:', error);
            });
    });
</script>
